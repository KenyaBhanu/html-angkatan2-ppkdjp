<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- kalau offline href nya ke direktori css bootstrap.min.css -->
    <style>
        .bg-1 {
            background-image: url("https://images.unsplash.com/photo-1769921546096-7a648d953a3e?q=80&w=1176&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
        }
    </style>
</head>

<body>
    <div class="container-fluid bg-1">
        <div class="row d-flex justify-content-center align-items-center vh-100">
            <!-- <div class="col-4">tes</div> -->
            <div class="col-3">
                <div class="card">
                    <div class="card-header">
                        <h4 class="text-center">Log in</h4>
                    </div>
                    <div class="card-body">
                        <form action="" method="post">
                            <div class="mb-2">
                                <label for="">Email</label>
                                <input type="email" class="form-control">
                            </div>
                            <div class="mb-2">
                                <label for="">Password</label>
                                <input type="password" class="form-control">
                            </div>
                            <button class="btn btn-success">Login</button>
                        </form>
                    </div>
                </div>
            </div>
            <!-- <div class="col-4">tes</div> -->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- kalau offline src nya ke direktori js bootstrap.bundle.min.js -->
</body>

</html>
